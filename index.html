<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeautyStore</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <img src="logo.svg" alt="Logo" class="logo">
    <h1>BeautyStore</h1>
    <h2>MAKEUP & BEAUTY</h2>
    <nav>
      <ul>
        <li><a href="#">Inicio</a></li>
        <li><a href="#">Productos</a></li>
        <li><a href="#">Reseñas</a></li>
        <li><a href="#">Contacto</a></li>
        <li><a href="#">Carrito 🛒 0</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="banner">
      <video autoplay muted loop controls>
        <source src="video.mp4" type="video/mp4">
        <track src="subtitulos.vtt" kind="subtitles" srclang="es" label="Español">
        Tu navegador no soporta video HTML5.
      </video>
    </section>

    <section class="productos">
      <h2>Nuestros Productos</h2>
      <div class="grid">
        <!-- Ejemplo de producto -->
        <div class="producto">
          <img src="img1.jpg" alt="Perfume Chanel">
          <h3>Chanel Coco Noir</h3>
          <p>Perfume elegante y sofisticado.</p>
        </div>
        <!-- Agregá más productos aquí -->
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 BeautyStore. Todos los derechos reservados.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
